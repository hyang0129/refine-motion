<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>refine-motion</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --accent: #7c6af7;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      width: 100%;
      max-width: 480px;
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.02em; }
    header .badge {
      font-size: 0.65rem;
      background: var(--accent);
      border-radius: 6px;
      padding: 2px 7px;
      color: #fff;
      font-weight: 600;
    }

    #setup {
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; display: block; }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid #2a2a34;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      padding: 16px;
      cursor: pointer;
      width: 100%;
    }

    #session { display: none; width: 100%; max-width: 480px; flex-direction: column; align-items: center; flex: 1; padding: 24px; gap: 24px; }

    #transcript {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .bubble.agent { background: var(--surface); align-self: flex-start; }
    .bubble.user  { background: var(--accent); align-self: flex-end; color: #fff; }

    #mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid #2a2a34;
      color: var(--text);
      font-size: 2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    #mic-btn.recording { background: #3a1a2e; border-color: #e05; }
    #mic-btn.busy { opacity: 0.4; pointer-events: none; }

    #status { font-size: 0.75rem; color: var(--muted); min-height: 1.2em; }
  </style>
</head>
<body>

<header>
  <h1>refine-motion</h1>
  <span class="badge">voice</span>
</header>

<div id="setup">
  <div>
    <label>Target repo path or GitHub URL</label>
    <input type="text" id="repo-path" placeholder="/path/to/repo  or  https://github.com/…" />
  </div>
  <div>
    <label>Issue title</label>
    <input type="text" id="issue-title" placeholder="e.g. Add real-time transcript overlay" />
  </div>
  <button class="primary" onclick="startSession()">Start refinement</button>
</div>

<div id="session">
  <div id="transcript"></div>
  <div id="status">Tap to speak</div>
  <button id="mic-btn" onclick="toggleRecord()">🎙</button>
</div>

<script>
const API = window.location.origin;
let sessionId = null;
let mediaRecorder = null;
let chunks = [];

async function startSession() {
  const repoPath = document.getElementById('repo-path').value.trim();
  const issueTitle = document.getElementById('issue-title').value.trim();
  if (!repoPath || !issueTitle) return alert('Fill in both fields.');

  const res = await fetch(`${API}/sessions/`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({repo_path: repoPath, issue_title: issueTitle}),
  });
  const data = await res.json();
  sessionId = data.session_id;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('session').style.display = 'flex';
}

async function toggleRecord() {
  const btn = document.getElementById('mic-btn');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  const stream = await navigator.mediaDevices.getUserMedia({audio: true});
  mediaRecorder = new MediaRecorder(stream);
  chunks = [];
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = sendAudio;
  mediaRecorder.start();
  btn.classList.add('recording');
  document.getElementById('status').textContent = 'Recording… tap to stop';
}

async function sendAudio() {
  const btn = document.getElementById('mic-btn');
  btn.classList.remove('recording');
  btn.classList.add('busy');
  document.getElementById('status').textContent = 'Processing…';

  const blob = new Blob(chunks, {type: 'audio/webm'});
  const form = new FormData();
  form.append('audio', blob, 'clip.webm');

  const res = await fetch(`${API}/voice/${sessionId}/turn`, {method: 'POST', body: form});
  const transcript = res.headers.get('X-Transcript') || '';
  const agentText = transcript; // header carries reply text; audio plays for TTS

  addBubble(agentText, 'agent');

  // Play audio reply
  const audioBlob = await res.blob();
  const audio = new Audio(URL.createObjectURL(audioBlob));
  audio.play();
  audio.onended = () => {
    btn.classList.remove('busy');
    document.getElementById('status').textContent = 'Tap to speak';
  };
}

function addBubble(text, role) {
  const div = document.createElement('div');
  div.className = `bubble ${role}`;
  div.textContent = text;
  document.getElementById('transcript').appendChild(div);
  div.scrollIntoView({behavior: 'smooth'});
}
</script>
</body>
</html>
